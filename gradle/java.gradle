java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(25)
  }
}

sourceSets {
  generated {
    java {
      srcDirs = ["$buildDir/generated/src/main/java"]
    }
  }
  main {
    compileClasspath += sourceSets.generated.output
    runtimeClasspath += sourceSets.generated.output
  }
  test {
    compileClasspath += sourceSets.generated.output
    runtimeClasspath += sourceSets.generated.output
  }
}

configurations {
  generatedImplementation.extendsFrom implementation
  generatedCompileOnly.extendsFrom compileOnly
  generatedAnnotationProcessor.extendsFrom annotationProcessor
}

tasks.named('wrapper') {
  delete "${projectDir}/gradlew.bat"
}

tasks.withType(JavaCompile).configureEach {
  options.compilerArgs = ["-Xlint:unchecked", "-Werror"]
}

tasks.named('compileGeneratedJava') {
  // OpenAPI-generated models pair a plain `= null` initializer on every
  // nullable field with the @lombok.Builder annotation from
  // additionalModelTypeAnnotations, which Lombok flags as a no-op
  // initializer warning. It's benign, regenerated on every build, and not
  // ours to hand-edit — relax to a warning for generated code only.
  // -Werror still applies in full to compileJava (hand-written code).
  options.compilerArgs = ["-Xlint:unchecked"]
}
